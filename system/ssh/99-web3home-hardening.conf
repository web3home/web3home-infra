# SSH hardening for web3home-infra
# Project: bee001 (Beelink GTR9 Pro)
# Applied: 2026-05-25

# Key-only authentication — no password fallback
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no

# Never allow root via SSH
PermitRootLogin no

# Never allow blank passwords (belt-and-braces)
PermitEmptyPasswords no

# Slow down brute force attempts
MaxAuthTries 3
LoginGraceTime 30

# Protect against terminal-emulator escape sequence attacks
PermitUserEnvironment no
