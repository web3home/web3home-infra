# Pre-commit hooks for web3home-infra
# Runs on every `git commit` — blocks commit if any hook fails
# Install hooks into this repo with: pre-commit install
# Update hook versions periodically with: pre-commit autoupdate

repos:
  # Secret scanner — primary defense against committing credentials
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # General hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '\.sops\.ya?ml$|\.enc\.ya?ml$|secrets/.*\.ya?ml$'
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  # Shell script linting
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
